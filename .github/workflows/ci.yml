name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-test-package:
    name: Build, test, and package
    runs-on: windows-latest
    timeout-minutes: 30
    env:
      DOTNET_CLI_TELEMETRY_OPTOUT: "1"
      DOTNET_NOLOGO: "1"

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install .NET SDK from global.json
        uses: actions/setup-dotnet@v5
        with:
          global-json-file: global.json

      - name: Restore
        shell: pwsh
        run: dotnet restore LayupPulse.sln

      - name: Verify formatting
        shell: pwsh
        run: dotnet format LayupPulse.sln --verify-no-changes --no-restore

      - name: Build Release
        shell: pwsh
        run: dotnet build LayupPulse.sln -c Release --no-restore

      - name: Run tests
        shell: pwsh
        run: dotnet test LayupPulse.sln -c Release --no-build

      - name: Publish and smoke-test Windows x64 package
        shell: pwsh
        run: ./scripts/package-demo.ps1

      - name: Upload Windows x64 demo
        uses: actions/upload-artifact@v4
        with:
          name: LayupPulse-win-x64
          path: artifacts/LayupPulse-win-x64.zip
          if-no-files-found: error
          retention-days: 14
